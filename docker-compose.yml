services:
  postgres:
    image: postgres:16-alpine
    container_name: corcodusa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corcodusa
    ports:
      - "5432:5432"
    volumes:
      - corcodusa_pg_data:/var/lib/postgresql/data

volumes:
  corcodusa_pg_data:
