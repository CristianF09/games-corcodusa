packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

autoInstallPeers: false

catalog:
  '@tailwindcss/vite': ^4.3.2
  '@tanstack/react-query': ^5.101.2
  '@types/node': ^25.9.4
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@vitejs/plugin-react': ^5.2.0
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.42.2
  lucide-react: ^0.545.0
  # Pinned exact; 19.1.4+ required by @clerk/react's peer range (~19.1.4).
  # (The old "expo requires it" comment was stale template boilerplate —
  # there is no Expo package in this workspace.)
  react: 19.1.4
  react-dom: 19.1.4
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.2
  tsx: ^4.23.0
  vite: ^7.3.6
  wouter: ^3.3.5
  zod: ^3.25.76
ignoredBuiltDependencies:
  - '@clerk/shared'
# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# This setting requires that any npm package version must have been published
# for at least 1 day (1440 minutes) before pnpm will allow installing it.
# This is a critical defense against supply-chain attacks. In most cases,
# malicious npm releases are discovered and pulled within hours, so a 1-day
# delay provides a strong safety buffer.
#
# DO NOT DISABLE THIS SETTING. Removing or setting it to 0 is considered
# extremely dangerous and leaves the entire workspace vulnerable to supply-
# chain attacks, which have been the #1 vector for npm ecosystem compromises.
#
# If you absolutely need to install a package before the 1-day window has
# passed (e.g. an urgent security bugfix), you can add it to the
# `minimumReleaseAgeExclude` allowlist below. Only consider doing this for
# packages released by trusted organizations with an impeccable security
# posture (e.g. react from Meta, typescript from Microsoft). Even then,
# remove the exclusion once the 1-day window has passed.
#
# Example:
#   minimumReleaseAgeExclude:
#     - react
#     - typescript
#
# ============================================================================
minimumReleaseAge: 1440

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  # drizzle-kit uses esbuild internally on an older version that's vulnerable, this overrides it
  # @vitejs/plugin-react's own range (^7.29.0) was resolving to the lowest
  # matching patch (7.29.0), still inside the arbitrary-file-read advisory
  # range (GHSA-4x5r-pxfx-6jf8, fixed >=7.29.1). Force the latest 7.29.x
  # patch instead of bumping to the unrelated major (8.x).
  "@babel/core": "^7.29.6"
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"
  # 0.27.3 had a known arbitrary-file-read vuln on the Windows dev server
  # (GHSA-g7r4-m6w7-qqqr); bumped to the patched release.
  esbuild: "0.28.1"
  # orval (API-client codegen, dev-only/build-time, never shipped) pulls these
  # transitively at versions with known DoS advisories. Forcing the patched
  # minor releases here avoids a risky orval major-version bump just to clear
  # a transitive audit finding.
  js-yaml: "^4.2.0"
  markdown-it: "^14.2.0"
